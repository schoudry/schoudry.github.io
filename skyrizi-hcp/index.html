    .cta-card-grid-container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  margin-top: 4px;
  margin-right: auto;
  margin-bottom: 0;
  margin-left: auto;
  background: #d1f1fc;
}

    .cta-card-grid p {
      margin: 0;
    }

    .cta-card-grid p a {
      position: relative;
      display: block;
      max-width: 300px;
      padding: 20px;
      background-color: #fff;
      border-radius: 8px;
      color: #193052;
      text-decoration: none;
      font-family: "Univers Regular", Arial, sans-serif;
    }

    .cta-card-grid p a::before {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 10px;
      background: linear-gradient(90deg, #00a7df 0%, #004c97 88%);
      border-radius: 0 0 8px 8px;
      content: "";
    }

    .cta-card-grid p a > span {
      display: block;
      line-height: 1;
    }

    .cta-card-grid-line-1 {
      font-family: 'Univers LT W01_57 Condensed', 'Arial Narrow', sans-serif;
      font-weight: 700;
      font-size: 2.375rem;
    }

    .cta-card-grid-line-1::after {
      margin-top: 4px;
      margin-left: 24px;
      background-color: #1ba2da;
      border-radius: 50%;
      color: #fff;
      font-size: 1.5rem;
      vertical-align: top;
    }

    .cta-card-grid-line-2 {
      font-family: "Univers Bold", "Univers Regular", Arial, sans-serif;
      font-weight: 600;
    }

    .cta-card-grid-line-3 {

      font-weight: 400;
    }

    .cta-card-grid-line-4 {

      font-weight: 700;
    }

    .cta-card-grid-risa-pri {

    }

    .cta-card-grid-richtext {
      margin: 24px 32px 24px 36px;
    }
    
  </style>
</head>
