<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SKYRIZI HCP — CTA card strip (dermatology)</title>
  <style>
    /*
      Scoped extraction from skyrizihcp.com:
      — skyrizi_hcp.css: .cta-card-container … .cta-card-line-4
      — clientlibs icon font + .i-a:after + .abbv-icon-keyboard_arrow_right
      Remote assets: icon WOFF + Univers woff2 (same CDN paths as production).
    */
    @font-face {
      font-family: "abbv-iconFont";
      src: url("https://www.skyrizihcp.com/etc/clientlibs/common-elements/clientlibs/framework/ui/fonts/abbv_iconFont.woff")
        format("woff");
      font-weight: normal;
      font-style: normal;
    }

    @font-face {
      font-family: "Univers Regular";
      font-weight: 400;
      src: url("https://www.skyrizihcp.com/content/dam/skyrizihcpivy/fonts/bf8f8741-5f64-4db9-a877-a44624092e68.woff2")
        format("woff2");
      font-display: swap;
    }

    @font-face {
      font-family: "Univers Bold";
      font-weight: 700;
      src: url("https://www.skyrizihcp.com/content/dam/skyrizihcpivy/fonts/3bdb4597-ff70-447c-8620-8836686bf840.woff2")
        format("woff2");
      font-display: swap;
    }
    .abbv-flex-container-v2 {
      display: flex;
    }

    i:before,
    i:after,
    .i-b:before,
    .i-a:after {
      font-family: "abbv-iconFont" !important;
      font-style: normal;
      font-weight: normal;
      font-variant: normal;
      text-transform: none;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      display: inline-block;
    }

    .i-a:after {
      margin-left: 10px;
    }

    .abbv-icon-keyboard_arrow_right.i-b:before,
    .abbv-icon-keyboard_arrow_right.i-a:after {
      content: "\e315";
    }

    .cta-card-container {
      flex-wrap: wrap;
      justify-content: center;
      margin: 32px auto 24px;
    }

    .cta-card-container--home {
      margin: 4px auto;
    }

    .cta-card-container--home .rich-text .cta-card p a {
      width: 290px;
      padding: 20px 24px;
    }

    .cta-card-container_top {
      margin-bottom: 0;
    }

    .cta-card-container_bottom {
      margin-top: 0;
    }

    .cta-card p {
      margin: 0;
    }

    .cta-card p a {
      position: relative;
      display: block;
      max-width: 300px;
      padding: 20px;
      background-color: #fff;
      border-radius: 8px;
      color: #193052;
      text-decoration: none;
      font-family: "Univers Regular", Arial, sans-serif;
    }

    .cta-card p a::before {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 10px;
      background: linear-gradient(90deg, #00a7df 0%, #004c97 88%);
      border-radius: 0 0 8px 8px;
      content: "";
    }

    .cta-card p a > span {
      display: block;
      line-height: 1;
    }

    .cta-card-line-1 {
      font-family: "Univers Bold", "Univers Regular", Arial, sans-serif;
      font-weight: 700;
    }

    .cta-card-line-1::after {
      margin-top: 4px;
      margin-left: 24px;
      background-color: #1ba2da;
      border-radius: 50%;
      color: #fff;
      font-size: 1.5rem;
      vertical-align: top;
    }

    .cta-card-line-2 {
      font-family: "Univers Bold", "Univers Regular", Arial, sans-serif;
      font-weight: 600;
    }

    .cta-card-line-3 {
      margin-bottom: 24px;
      font-weight: 400;
    }

    .cta-card-line-4 {
      font-family: "Univers Bold", "Univers Regular", Arial, sans-serif;
      font-weight: 700;
    }

    .c-risa-pri {
      color: #1ba2da;
    }
  </style>
</head>
<body>

  <!-- Source: .abbv-flex-container-v2.cta-card-container.cta-card-container--home.cta-card-container_bottom from /dermatology -->
  <div class="abbv-flex-container-v2 cta-card-container cta-card-container--home cta-card-container_bottom">

    <div class="rich-text">
      <div class="abbv-rich-text cta-card abbv-rich-text-common">
        <p>
          <a href="https://www.skyrizihcp.com/dermatology/psoriasis-efficacy/skyrizi-vs-cosentyx" target="_self">
            <span class="cta-card-line-1 abbv-icon-keyboard_arrow_right i-a"><span class="c-risa-pri">SKYRIZI</span> VS</span><span class="cta-card-line-2">COSENTYX®</span>
            <span class="cta-card-line-3">(secukinumab)<sup>10</sup>**</span>
            <span class="cta-card-line-4">IL-17A inhibitor</span>
          </a>
        </p>
      </div>
    </div>

    <div class="rich-text">

        <p>
          <a href="https://www.skyrizihcp.com/dermatology/psoriasis-efficacy/skyrizi-vs-humira" target="_self">
            <span class="cta-card-line-1 abbv-icon-keyboard_arrow_right i-a"><span class="c-risa-pri">SKYRIZI</span> VS</span><span class="cta-card-line-2">HUMIRA®</span>
            <span class="cta-card-line-3">(adalimumab)<sup>11</sup></span>
            <span class="cta-card-line-4">TNF inhibitor</span>
          </a>
        </p>
      </div>
    </div>

    <div class="rich-text">
      <div class="abbv-rich-text cta-card cta-card--centered abbv-rich-text-common">
        <p>
          <a href="https://www.skyrizihcp.com/dermatology/psoriasis-efficacy/skyrizi-vs-stelara" target="_self">
            <span class="cta-card-line-1 abbv-icon-keyboard_arrow_right i-a"><span class="c-risa-pri">SKYRIZI</span> VS</span><span class="cta-card-line-2">STELARA®</span>
            <span class="cta-card-line-3">(ustekinumab)<sup>1,2††</sup></span>
            <span class="cta-card-line-4">IL-12 and IL-23 inhibitor</span>
          </a>
        </p>
      </div>
    </div>

  </div>

</body>
</html>
